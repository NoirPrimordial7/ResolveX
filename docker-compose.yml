name: resolvex

services:
  db:
    image: postgres:16-alpine
    container_name: resolvex-db
    environment:
      POSTGRES_DB: resolvex
      POSTGRES_USER: resolvex
      POSTGRES_PASSWORD: resolvex
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolvex -d resolvex"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: resolvex-backend
    environment:
      APP_NAME: ResolveX - Customer Support Ticket Management System
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://resolvex:resolvex@db:5432/resolvex
      DB_POOL_SIZE: 5
      DB_MAX_OVERFLOW: 10
      SECRET_KEY: local-docker-secret-change-before-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: node:22-alpine
    container_name: resolvex-frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  frontend_node_modules:
